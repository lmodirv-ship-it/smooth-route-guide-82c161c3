name: Build Android AAB (Google Play)

on:
  workflow_dispatch:        # تشغيل يدوي من تبويب Actions
  push:
    tags:
      - 'v*'                # أو دفع tag مثل v1.0.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Signed AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build web app
        run: pnpm build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/hn-driver-release.keystore

      - name: Create keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties << EOF
          storeFile=hn-driver-release.keystore
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: hn-driver-play-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK artifact (bonus)
        if: always()
        run: |
          cd android && ./gradlew assembleRelease --no-daemon || true
        continue-on-error: true

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hn-driver-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
